<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE ARMORY | Vengeance Store</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com">
    <link href="https://fonts.googleapis.com" rel="stylesheet">
    <link href="https://unpkg.com" rel="stylesheet">
</head>
<body>

<header>
    <nav>
        <div class="nav-left">
          <a href="index.html">
            <img src="images/logo.png" class="logo" alt="Armory">
          </a>
            <a href="index.html">INTEL</a>
            <a href="armory.html" class="active">ARMORY</a>
            <a href="deployments.html">DEPLOYMENTS</a>
            <a href="vault.html">THE VAULT</a>
        </div>
        <div class="nav-right">
            <div class="icon-btn" onclick="toggleCart()"><i class="fas fa-crosshairs"></i><span id="cartCount">0</span></div>
            <div class="profile-container">
                <img src="images/witcher3.jpg" class="avatar-trigger" onclick="toggleProfileMenu()">
                <div id="profileDropdown" class="profile-menu">
                    <div class="menu-header"><h4>Aglowharmony10</h4><p id="profile-rank">Shadow Initiate</p></div>
                    <div class="xp-mini-bar"><div id="xpProgress" class="xp-fill"></div></div>
                    <a href="profile.html">MY STATS</a>
                    <a href="logout.html" class="logout-link">DISCONNECT</a>
                </div>
            </div>
        </div>
    </nav>
</header>

<!--armory hero-->
<section class="store-hero" style="background: linear-gradient(rgba(0,0,0,0.8), rgba(0,0,0,0.8)), url('images/armory.jpg') center/cover;">
    <div class="hero-content" data-aos="zoom-in">
        <h1 class="glitch-text">THE ARMORY</h1>
        <p>SCANNING SECTORS FOR PRICE DROPS...</p>
        <div class="search-box">
            <i class="fas fa-search"></i>
            <input type="text" id="gameSearch" placeholder="Search for Intel/Games..." onkeyup="filterGames()">
        </div>
    </div>
</section>

<!-- STORE GRID -->
<section class="store-container">
  <div class="store-grid" id="gameGrid">
    <div class="store-card" data-name="God of War">
      <div class="store-badge">LOWEST PRICE</div>
      <img src="images/godofwar.png" alt="GOW">
      <div class="store-info">
        <h3>GOD OF WAR</h3>
        <div class="price-compare">
          <span>Steam: <strong class="cyan">$29.99</strong></span>
          <span>Epic: <strong>$34.99</strong></span>
        </div>
        <button class="btn-primary" onclick="addToCart('God of War: $29.99')">SYNC DEAL</button>
      </div>
    </div>

    <div class="store-card" data-name="Warzone">
      <div class="store-badge">FREE</div>
      <img src="images/warzone.jpg" alt="Warzone">
      <div class="store-info">
        <h3>CALL OF DUTY: WARZONE</h3>
        <div class="price-compare">
          <span>Battlenet: <strong class="cyan">$0.00</strong></span>
          <span>Steam: <strong>$0.00</strong></span>
        </div>
        <button class="btn-primary" onclick="addToCart('Warzone: Free')">SYNC DEAL</button>
      </div>
    </div>

  </div>
</section>

<!-- TRACKER PANEL -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/animejs/3.2.1/anime.min.js"></script>
<script src="script.js"></script>

<script>
  /*search*/
  function filterGames() {
    let input = document.getElementById('gameSearch').value.toLowerCase();
    let cards = document.querySelectorAll('.store-card');

    cards.forEach(card => {
      let name = card.getAttribute('data-name').toLowerCase();

      if (name.includes(input)) {
        card.style.display = "block";
        anime({
          targets: card,
          opacity: [0, 1],
          scale: [0.9, 1],
          duration: 500,
          easing: 'easeOutExpo'
        });
      } else {
        // Smoothly fade out the card
        anime({
          targets: card,
          opacity: 0,
          scale: 0.9,
          duration: 400,
          easing: 'easeOutExpo',
          complete: () => {
            card.style.display = "none";
          }
        });
      }
    });
  }
</script>
</body>
</html>
